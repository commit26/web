<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체육쌤의 맞춤형 건강 계산기 (BMI & BMR)</title>
    <style>
        /* 기본 스타일 및 스포티 다크 테마 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #1a1e29;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 80px; /* 홈 버튼 겹침 방지 */
        }

        /* 🏠 상단 고정 네비게이션 바 */
        .top-nav {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: rgba(37, 43, 61, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(204, 255, 0, 0.2);
            z-index: 999;
            margin-bottom: 30px;
        }

        .nav-title {
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
        }

        .nav-title span {
            color: #ccff00;
        }

        .top-home-btn {
            color: #ccff00;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 12px;
            border: 1px solid #ccff00;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .top-home-btn:hover {
            background-color: #ccff00;
            color: #1a1e29;
        }

        /* 메인 컨테이너 */
        .container {
            background-color: #252b3d;
            width: calc(100% - 40px);
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 30px;
            border: 1px solid rgba(204, 255, 0, 0.1);
            margin: 0 20px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        h1 span {
            color: #ccff00; /* 형광 연두색 포인트 */
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 30px;
        }

        /* 입력 폼 스타일 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background-color: #121620;
            border: 2px solid #3f4865;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #ccff00;
            box-shadow: 0 0 8px rgba(204, 255, 0, 0.3);
        }

        /* 성별 라디오 버튼 스타일 */
        .gender-group {
            display: flex;
            gap: 15px;
        }

        .gender-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background-color: #121620;
            border: 2px solid #3f4865;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        input[type="radio"] {
            display: none;
        }

        input[type="radio"]:checked + .gender-label {
            background-color: #ccff00;
            border-color: #ccff00;
            color: #1a1e29;
        }

        /* 제출 버튼 */
        .btn-submit {
            width: 100%;
            background-color: #ccff00;
            color: #1a1e29;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            background-color: #b3ff00;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(204, 255, 0, 0.4);
        }

        /* 결과 창 스타일 */
        .result-container {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px dashed #3f4865;
            display: none;
        }

        .result-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            color: #ccff00;
        }

        .result-card {
            background-color: #121620;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-label {
            font-size: 14px;
            color: #a0aec0;
        }

        .result-value {
            font-size: 20px;
            font-weight: 800;
        }

        /* BMI 등급별 색상 마커 */
        .bmi-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
        }
        .underweight { background-color: #3182ce; color: white; }
        .normal { background-color: #38a169; color: white; }
        .overweight { background-color: #dd6b20; color: white; }
        .obese { background-color: #e53e3e; color: white; }

        /* 선생님 한마디 폰트 및 스타일 */
        .teacher-box {
            background-color: rgba(204, 255, 0, 0.05);
            border: 1px solid rgba(204, 255, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .teacher-title {
            font-size: 15px;
            font-weight: 700;
            color: #ccff00;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .teacher-comment {
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
        }

        /* 🏠 필수 고정 홈 버튼 링크 */
        .home-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #ffffff;
            color: #1a1e29;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            z-index: 1000;
        }

        .home-btn:hover {
            background-color: #ccff00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-title">🏃‍♂️ PE <span>CLASS</span></div>
        <a href="index.html" class="top-home-btn">🏠 메인으로 돌아가기</a>
    </nav>

    <div class="container">
        <h1>🏃‍♂️ 체육쌤의 <span>건강 계산기</span></h1>
        <p class="subtitle">나의 BMI와 기초대사량을 측정해 보세요!</p>

        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" placeholder="이름을 입력하세요" required>
        </div>

        <div class="form-group">
            <label>성별</label>
            <div class="gender-group">
                <input type="radio" id="male" name="gender" value="male" checked>
                <label for="male" class="gender-label">남학생</label>

                <input type="radio" id="female" name="gender" value="female">
                <label for="female" class="gender-label">여학생</label>
            </div>
        </div>

        <div class="form-group">
            <label for="age">나이 (세)</label>
            <input type="number" id="age" placeholder="예: 17" min="1" max="100" required>
        </div>

        <div class="form-group">
            <label for="height">키 (cm)</label>
            <input type="number" id="height" placeholder="예: 172.5" step="0.1" required>
        </div>

        <div class="form-group">
            <label for="weight">몸무게 (kg)</label>
            <input type="number" id="weight" placeholder="예: 65.2" step="0.1" required>
        </div>

        <button type="button" class="btn-submit" onclick="calculateHealth()">건강 상태 계산하기</button>

        <div class="result-container" id="resultContainer">
            <div class="result-title" id="welcomeMsg">측정 결과</div>
            
            <div class="result-card">
                <span class="result-label">비만도 (BMI)</span>
                <div>
                    <span class="result-value" id="bmiValue">0.0</span>
                    <span id="bmiStatus" class="bmi-badge">정상</span>
                </div>
            </div>

            <div class="result-card">
                <span class="result-label">하루 기초대사량 (BMR)</span>
                <span class="result-value" id="bmrValue">0 kcal</span>
            </div>

            <div class="teacher-box">
                <div class="teacher-title">📋 체육 선생님의 맞춤 한마디</div>
                <div class="teacher-comment" id="teacherComment">
                    데이터를 입력하면 체육 선생님의 건강 피드백이 나타납니다.
                </div>
            </div>
        </div>
    </div>

    <a href="index.html" class="home-btn">🏠 메인으로 돌아가기</a>

    <script>
        function calculateHealth() {
            // 입력값 가져오기
            const name = document.getElementById('name').value.trim() || "학생";
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const age = parseFloat(document.getElementById('age').value);
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);

            // 유효성 검사
            if (!age || !height || !weight) {
                alert("나이, 키, 몸무게를 정확히 입력해 주세요!");
                return;
            }

            // 1. BMI 계산 (키는 m 단위로 환산)
            const heightInMeters = height / 100;
            const bmi = weight / (heightInMeters * heightInMeters);
            const roundedBmi = bmi.toFixed(1);

            // BMI 등급 및 피드백 설정
            let bmiStatusText = "";
            let bmiClass = "";
            let comment = "";

            if (bmi < 18.5) {
                bmiStatusText = "저체중";
                bmiClass = "underweight";
                comment = "성장기에는 골고루 먹는 것이 중요해요! 근력 운동을 통해 건강한 몸을 만들어봐요 💪";
            } else if (bmi >= 18.5 && bmi <= 22.9) {
                bmiStatusText = "정상";
                bmiClass = "normal";
                comment = "아주 훌륭한 건강 상태입니다! 지금처럼 꾸준한 체육 활동으로 체력을 유지하세요 🏅";
            } else if (bmi >= 23 && bmi <= 24.9) {
                bmiStatusText = "과체중";
                bmiClass = "overweight";
                comment = "조금 더 활기차게 움직여볼까요? 하루 30분 신나는 유산소 운동과 함께 간식을 조금만 줄여봐요 🏃‍♂️";
            } else {
                bmiStatusText = "비만";
                bmiClass = "obese";
                comment = "조금 더 활기차게 움직여볼까요? 하루 30분 신나는 유산소 운동과 함께 간식을 조금만 줄여봐요 🏃‍♂️";
            }

            // 2. 기초대사량(BMR) 계산 (해리스-베네딕트 공식)
            let bmr = 0;
            if (gender === 'male') {
                bmr = 88.362 + (13.397 * weight) + (4.799 * height) - (5.677 * age);
            } else {
                bmr = 447.593 + (9.247 * weight) + (3.098 * height) - (4.330 * age);
            }
            const roundedBmr = Math.round(bmr);

            // 화면에 결과 반영하기
            document.getElementById('welcomeMsg').innerText = `🎉 ${name} 학생의 건강 성적표`;
            document.getElementById('bmiValue').innerText = roundedBmi;
            
            const bmiStatusBadge = document.getElementById('bmiStatus');
            bmiStatusBadge.innerText = bmiStatusText;
            bmiStatusBadge.className = `bmi-badge ${bmiClass}`; // 클래스 초기화 및 부여
            
            document.getElementById('bmrValue').innerText = `${roundedBmr.toLocaleString()} kcal`;
            document.getElementById('teacherComment').innerText = comment;

            // 결과창 부드럽게 보여주기
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.style.display = 'block';
            
            // 결과 화면으로 부드럽게 스크롤
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
