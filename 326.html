<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네온 스네이크 게임 (Neon Snake Game)</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons (홈 아이콘 및 게임 아이콘용) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');
    
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #0d0e15;
    }
    
    .font-neon {
      font-family: 'Orbitron', sans-serif;
    }

    /* 네온 효과 스타일 */
    .neon-text-green {
      text-shadow: 0 0 5px #10b981, 0 0 15px #10b981;
    }
    
    .neon-text-pink {
      text-shadow: 0 0 5px #ec4899, 0 0 15px #ec4899;
    }

    .neon-border {
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2), inset 0 0 10px rgba(16, 185, 129, 0.2);
    }

    /* 게임 캔버스 테두리 네온 효과 */
    #gameCanvas {
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
      background-color: #11131e;
    }

    /* 가상 키패드 버튼 활성화 효과 */
    .key-btn:active {
      transform: scale(0.92);
      background-color: #10b981;
      color: #0d0e15;
      box-shadow: 0 0 15px #10b981;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen text-white p-4 overflow-x-hidden">

  <!-- 상단 헤더 영역 -->
  <header class="w-full max-w-md text-center my-2">
    <h1 class="text-3xl font-extrabold font-neon text-emerald-400 tracking-wider neon-text-green flex items-center justify-center gap-2">
      <i data-lucide="gamepad-2" class="w-8 h-8"></i> SNAKE NEON
    </h1>
    <p class="text-xs text-gray-400 mt-1">AI와 함께 만든 나만의 미니 게임</p>
  </header>

  <!-- 메인 게임 영역 컨테이너 -->
  <main class="w-full max-w-md flex flex-col items-center flex-grow justify-center">
    
    <!-- 점수판 및 게임 정보 -->
    <div class="w-full flex justify-between items-center bg-gray-900/80 border border-gray-800 rounded-xl p-3 mb-3 neon-border">
      <div class="flex flex-col items-center px-4">
        <span class="text-xs text-gray-400 uppercase tracking-wider font-neon">Score</span>
        <span id="scoreDisplay" class="text-2xl font-bold font-neon text-emerald-400">0</span>
      </div>
      <div class="flex flex-col items-center px-4 border-l border-gray-800">
        <span class="text-xs text-gray-400 uppercase tracking-wider font-neon">Best</span>
        <span id="highScoreDisplay" class="text-2xl font-bold font-neon text-pink-500 neon-text-pink">0</span>
      </div>
    </div>

    <!-- 게임 화면 (캔버스) 및 오버레이 안내창 -->
    <div class="relative w-full aspect-square max-w-[360px] sm:max-w-[380px] rounded-xl overflow-hidden border-2 border-emerald-500">
      <canvas id="gameCanvas" width="400" height="400" class="w-full h-full block"></canvas>
      
      <!-- 시작 / 게임 오버 오버레이 화면 -->
      <div id="overlay" class="absolute inset-0 bg-black/85 flex flex-col items-center justify-center p-6 text-center transition-opacity duration-300">
        <div id="overlayContent">
          <h2 id="overlayTitle" class="text-2xl font-black text-emerald-400 mb-2 neon-text-green font-neon">NEON SNAKE</h2>
          <p id="overlayDesc" class="text-sm text-gray-300 mb-6 leading-relaxed">
            화면의 핑크색 먹이를 먹고 몸집을 키우세요!<br>
            벽이나 자신의 몸에 부딪히면 게임오버됩니다.<br>
            <span class="text-xs text-emerald-400 mt-2 block font-semibold">키보드 방향키 또는 화면 버튼으로 조작</span>
          </p>
          <button id="startBtn" class="px-8 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold rounded-full transition-all duration-200 shadow-lg shadow-emerald-500/50 hover:shadow-emerald-400/80 transform hover:-translate-y-0.5 active:translate-y-0 text-lg">
            게임 시작
          </button>
        </div>
      </div>
    </div>

    <!-- 가상 키패드 (모바일 및 터치 디바이스 조작용) -->
    <div class="w-full max-w-[240px] mt-4 mb-2 grid grid-cols-3 gap-2">
      <div></div>
      <button id="keyUp" class="key-btn h-14 bg-gray-900 border border-gray-800 text-emerald-400 rounded-xl flex items-center justify-center shadow-md transition-all">
        <i data-lucide="chevron-up" class="w-8 h-8"></i>
      </button>
      <div></div>
      
      <button id="keyLeft" class="key-btn h-14 bg-gray-900 border border-gray-800 text-emerald-400 rounded-xl flex items-center justify-center shadow-md transition-all">
        <i data-lucide="chevron-left" class="w-8 h-8"></i>
      </button>
      <div class="h-14 flex items-center justify-center">
        <span class="text-[10px] text-gray-500 uppercase tracking-widest font-neon font-bold">PAD</span>
      </div>
      <button id="keyRight" class="key-btn h-14 bg-gray-900 border border-gray-800 text-emerald-400 rounded-xl flex items-center justify-center shadow-md transition-all">
        <i data-lucide="chevron-right" class="w-8 h-8"></i>
      </button>
      
      <div></div>
      <button id="keyDown" class="key-btn h-14 bg-gray-900 border border-gray-800 text-emerald-400 rounded-xl flex items-center justify-center shadow-md transition-all">
        <i data-lucide="chevron-down" class="w-8 h-8"></i>
      </button>
      <div></div>
    </div>

  </main>

  <!-- 하단 푸터 및 필수 홈 링크 영역 -->
  <footer class="w-full max-w-md flex justify-between items-center mt-4 pt-4 border-t border-gray-900/60 text-xs text-gray-500">
    <div>Made with Gemini Canvas 💻</div>
    <!-- 필수 준수 사항: index.html 메인화면 링크 적용 -->
    <a href="index.html" class="flex items-center gap-1.5 px-3 py-1.5 bg-gray-900 border border-gray-800 text-emerald-400 hover:text-emerald-300 hover:border-emerald-500/40 rounded-lg font-medium transition-all shadow-sm">
      <i data-lucide="home" class="w-3.5 h-3.5"></i>
      <span>메인으로 돌아가기</span>
    </a>
  </footer>

  <!-- 게임 로직 구현 자바스크립트 -->
  <script>
    // Lucide 아이콘 초기화
    lucide.createIcons();

    // DOM 요소 가져오기
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const highScoreDisplay = document.getElementById('highScoreDisplay');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayDesc = document.getElementById('overlayDesc');
    const startBtn = document.getElementById('startBtn');

    // 게임 판 크기 및 격자(Grid) 설정
    const gridSize = 20;
    const tileCount = canvas.width / gridSize; // 400 / 20 = 20칸

    // 게임 상태 변수들
    let snake = [];
    let food = { x: 0, y: 0 };
    let dx = gridSize; // X축 이동 속도 (오른쪽이 디폴트)
    let dy = 0;        // Y축 이동 속도
    let score = 0;
    let highScore = localStorage.getItem('snake_high_score') || 0;
    let gameInterval = null;
    const gameSpeed = 110; // 게임 속도 (밀리초 단위, 작을수록 빠름)
    let isGameRunning = false;
    let changingDirection = false; // 한 프레임에 여러 방향키를 누르는 버그 방지용

    // 최고 점수 표시 업데이트
    highScoreDisplay.textContent = highScore;

    // 게임 시작 및 리셋 함수
    function startGame() {
      // 초기 뱀 설정 (가운데 위치, 길이 3)
      snake = [
        { x: 5 * gridSize, y: 10 * gridSize },
        { x: 4 * gridSize, y: 10 * gridSize },
        { x: 3 * gridSize, y: 10 * gridSize }
      ];
      
      score = 0;
      scoreDisplay.textContent = score;
      dx = gridSize;
      dy = 0;
      
      generateFood();
      
      // 오버레이 화면 숨기기
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.classList.add('hidden');
      }, 300);

      isGameRunning = true;
      changingDirection = false;

      // 이전 인터벌 청소 및 루프 재생 시작
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, gameSpeed);
    }

    // 메인 게임 루프
    function gameLoop() {
      if (hasGameEnded()) {
        gameOver();
        return;
      }

      changingDirection = false;
      clearCanvas();
      drawFood();
      moveSnake();
      drawSnake();
    }

    // 배경 캔버스 그리기 (네온 그리드 라인 포함)
    function clearCanvas() {
      // 검은색에 가까운 배경색 칠하기
      ctx.fillStyle = '#11131e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 격자 가이드라인 옅게 그려 스타일 더하기
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
      ctx.lineWidth = 1;
      for (let i = 0; i < canvas.width; i += gridSize) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }
    }

    // 뱀 그리기 (네온 스타일)
    function drawSnake() {
      snake.forEach((part, index) => {
        const isHead = index === 0;
        
        if (isHead) {
          // 머리는 조금 더 크고 강한 네온 연두색
          ctx.fillStyle = '#10b981';
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#10b981';
        } else {
          // 몸통은 그라데이션처럼 약간씩 연해지는 청록색
          ctx.fillStyle = '#059669';
          ctx.shadowBlur = 0; // 프레임 속도 확보를 위해 몸통은 그림자 제거
        }

        // 모서리가 둥근 뱀 마디 그리기
        drawRoundedRect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2, 4);
      });
      
      // 상태 복구
      ctx.shadowBlur = 0;
    }

    // 모서리 둥근 사각형 그리기 헬퍼 함수
    function drawRoundedRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
    }

    // 뱀 이동 로직 및 먹이 섭취 처리
    function moveSnake() {
      // 새로운 머리 위치 생성
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      snake.unshift(head);

      // 머리가 먹이와 부딪혔는지 검증
      const hasEatenFood = snake[0].x === food.x && snake[0].y === food.y;
      if (hasEatenFood) {
        score += 10;
        scoreDisplay.textContent = score;
        generateFood();
        // 꼬리를 자르지 않아 뱀의 길이가 1 늘어남
      } else {
        // 먹이를 먹지 않았다면 마지막 꼬리를 잘라 이동 유도
        snake.pop();
      }
    }

    // 먹이(푸드) 생성 (뱀 몸통 위에 생성되지 않도록 가공)
    function generateFood() {
      function randomCoord() {
        return Math.floor(Math.random() * tileCount) * gridSize;
      }
      
      let newFoodX, newFoodY;
      let foodOnSnake = true;
      
      while (foodOnSnake) {
        newFoodX = randomCoord();
        newFoodY = randomCoord();
        
        // 생성된 좌표가 뱀의 몸통과 겹치는지 체크
        foodOnSnake = snake.some(part => part.x === newFoodX && part.y === newFoodY);
      }
      
      food = { x: newFoodX, y: newFoodY };
    }

    // 먹이 그리기 (분홍색 네온 빛)
    function drawFood() {
      ctx.fillStyle = '#ec4899';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ec4899';
      
      // 먹이는 동그랗고 귀엽게 묘사
      ctx.beginPath();
      ctx.arc(food.x + gridSize / 2, food.y + gridSize / 2, (gridSize / 2) - 2, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0; // 원래대로 원복
    }

    // 게임 종료 조건 판정
    function hasGameEnded() {
      // 1. 벽에 부딪힘
      const hitLeftWall = snake[0].x < 0;
      const hitRightWall = snake[0].x >= canvas.width;
      const hitToptWall = snake[0].y < 0;
      const hitBottomWall = snake[0].y >= canvas.height;

      if (hitLeftWall || hitRightWall || hitToptWall || hitBottomWall) {
        return true;
      }

      // 2. 자신의 몸통에 부딪힘 (첫 머리 부분을 제외한 나머지와 체크)
      for (let i = 4; i < snake.length; i++) {
        if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
          return true;
        }
      }

      return false;
    }

    // 게임 오버 처리
    function gameOver() {
      clearInterval(gameInterval);
      isGameRunning = false;
      
      // 최고 점수 업데이트
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snake_high_score', highScore);
        highScoreDisplay.textContent = highScore;
      }

      // 오버레이 팝업 노출 및 텍스트 갱신
      overlayTitle.textContent = "GAME OVER";
      overlayTitle.className = "text-3xl font-black text-rose-500 mb-2 neon-text-pink font-neon";
      
      overlayDesc.innerHTML = `
        이번 플레이 점수: <strong class="text-emerald-400 text-lg">${score}점</strong><br>
        <span class="text-xs text-gray-400 mt-2 block">조금만 더 집중해서 신기록을 경신해 보세요!</span>
      `;
      startBtn.textContent = "다시 시도";

      overlay.classList.remove('hidden');
      setTimeout(() => {
        overlay.style.opacity = '1';
      }, 50);
    }

    // 방향 변경 제어 함수
    function changeDirection(direction) {
      if (changingDirection) return;

      const goingUp = dy === -gridSize;
      const goingDown = dy === gridSize;
      const goingRight = dx === gridSize;
      const goingLeft = dx === -gridSize;

      if (direction === 'LEFT' && !goingRight) {
        dx = -gridSize;
        dy = 0;
        changingDirection = true;
      }
      if (direction === 'UP' && !goingDown) {
        dx = 0;
        dy = -gridSize;
        changingDirection = true;
      }
      if (direction === 'RIGHT' && !goingLeft) {
        dx = gridSize;
        dy = 0;
        changingDirection = true;
      }
      if (direction === 'DOWN' && !goingUp) {
        dx = 0;
        dy = gridSize;
        changingDirection = true;
      }
    }

    // 1) 키보드 이벤트 리스너 등록
    window.addEventListener('keydown', (e) => {
      if (!isGameRunning) return;
      
      switch (e.key) {
        case 'ArrowLeft':
        case 'a':
        case 'A':
          changeDirection('LEFT');
          break;
        case 'ArrowUp':
        case 'w':
        case 'W':
          changeDirection('UP');
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          changeDirection('RIGHT');
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          changeDirection('DOWN');
          break;
      }
    });

    // 2) 가상 키패드(터치) 이벤트 리스너 등록
    document.getElementById('keyUp').addEventListener('click', () => changeDirection('UP'));
    document.getElementById('keyLeft').addEventListener('click', () => changeDirection('LEFT'));
    document.getElementById('keyRight').addEventListener('click', () => changeDirection('RIGHT'));
    document.getElementById('keyDown').addEventListener('click', () => changeDirection('DOWN'));

    // 3) 모바일 화면 등 터치 스와이프 기능 지원 (터치스크린 편의 기능)
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      if (!isGameRunning) return;

      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;

      const diffX = touchEndX - touchStartX;
      const diffY = touchEndY - touchStartY;

      // 가장 긴 변위 축 판별 후 조작 적용
      if (Math.abs(diffX) > Math.abs(diffY)) {
        if (Math.abs(diffX) > 30) { // 오작동 방지 최소 밀기 값
          if (diffX > 0) changeDirection('RIGHT');
          else changeDirection('LEFT');
        }
      } else {
        if (Math.abs(diffY) > 30) {
          if (diffY > 0) changeDirection('DOWN');
          else changeDirection('UP');
        }
      }
    }, { passive: true });

    // 시작 버튼 바인딩
    startBtn.addEventListener('click', startGame);

    // 초기 화면 그리기
    clearCanvas();
  </script>
</body>
</html>
