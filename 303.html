<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잔혹동화 텍스트 RPG: 심연의 숲</title>
  <!-- Tailwind CSS CDN 사용 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
    
    body {
      font-family: 'Noto Serif KR', 'Noto Sans KR', serif;
      transition: background-color 2.0s ease, color 2.0s ease;
    }
    
    /* 스토리가 심화되면서 배경 분위기를 점진적으로 바꾸기 위한 테마 정의 */
    .theme-bright {
      background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%); /* 고요하고 투명한 숲과 은빛 하늘 */
    }
    
    .theme-creepy {
      background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 50%, #94a3b8 100%); /* 빛바랜 보랏빛 안개와 잿빛 */
    }
    
    .theme-dark {
      background: linear-gradient(135deg, #450a0a 0%, #1c1917 100%); /* 가라앉은 핏빛과 어둠 */
    }
    
    .theme-abyss {
      background: linear-gradient(135deg, #180828 0%, #030712 100%); /* 빛이 닿지 않는 영원한 공허 */
    }

    /* 텍스트는 항상 굵고 선명한 검은색 또는 깊은 색조 유지 */
    .text-bold-black {
      font-weight: 700;
      color: #0f172a;
    }

    /* 피가 화면에 튀는 듯한 시각 효과 */
    .blood-splatter {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(127, 29, 29, 0.2);
      pointer-events: none;
      animation: flashBlood 0.6s ease-out forwards;
      z-index: 50;
    }

    @keyframes flashBlood {
      0% { opacity: 0; }
      15% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 화면 흔들림 효과 */
    .shake-animation {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      20% { transform: translate(-4px, 2px) rotate(-0.5deg); }
      40% { transform: translate(3px, -1px) rotate(0.5deg); }
      60% { transform: translate(-3px, -2px) rotate(-0.5deg); }
      80% { transform: translate(2px, 1px) rotate(0.5deg); }
    }

    /* 타격 대미지 팝업 효과 */
    .damage-text {
      position: absolute;
      font-weight: 900;
      font-size: 2.2rem;
      animation: dmgPop 1.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      pointer-events: none;
      z-index: 30;
      text-shadow: 2px 2px 2px rgba(0,0,0,0.8);
    }

    @keyframes dmgPop {
      0% { transform: translateY(0) scale(0.3); opacity: 0; }
      20% { transform: translateY(-25px) scale(1.1); opacity: 1; }
      100% { transform: translateY(-70px) scale(0.9); opacity: 0; }
    }
  </style>
</head>
<body class="theme-bright min-h-screen flex flex-col items-center justify-between p-4 relative overflow-x-hidden select-none">
  
  <!-- 피 이펙트 컨테이너 -->
  <div id="effect-container"></div>

  <!-- 상단 헤더 & 플레이어 상태창 -->
  <header class="w-full max-w-2xl bg-white/90 backdrop-blur-sm border-2 border-slate-900 rounded-2xl p-4 shadow-[4px_4px_0px_0px_rgba(15,23,42,1)] z-10 mb-4 transition-all">
    <div class="flex justify-between items-center mb-2">
      <h1 class="text-2xl font-black text-bold-black flex items-center gap-2">
        <i data-lucide="compass" class="text-slate-800" id="game-icon"></i> 
        <span class="tracking-wider">심연의 숲</span>
      </h1>
      <span class="bg-slate-900 text-slate-100 px-3 py-1 rounded-full text-xs font-bold tracking-widest" id="stage-badge">
        아르카디아의 침묵
      </span>
    </div>
    
    <!-- 능력치 그리드 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-sm mt-3 pt-3 border-t border-slate-200">
      <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
        <i data-lucide="star" class="text-amber-500 w-5 h-5"></i>
        <div>
          <p class="text-[10px] text-slate-500 font-bold">성장</p>
          <p class="font-bold text-bold-black" id="status-level">Lv. 1</p>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
        <i data-lucide="activity" class="text-emerald-600 w-5 h-5"></i>
        <div class="w-full">
          <div class="flex justify-between text-[10px] text-slate-500 font-bold">
            <span>생명</span>
            <span id="hp-text">100/100</span>
          </div>
          <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden mt-1">
            <div id="hp-bar" class="bg-emerald-600 h-full transition-all duration-300" style="width: 100%"></div>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
        <i data-lucide="swords" class="text-rose-600 w-5 h-5"></i>
        <div>
          <p class="text-[10px] text-slate-500 font-bold">투지</p>
          <p class="font-bold text-bold-black" id="status-atk">15</p>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
        <i data-lucide="sparkles" class="text-sky-600 w-5 h-5"></i>
        <div class="w-full">
          <div class="flex justify-between text-[10px] text-slate-500 font-bold">
            <span>경험</span>
            <span id="exp-text">0/100</span>
          </div>
          <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden mt-1">
            <div id="exp-bar" class="bg-sky-500 h-full transition-all duration-300" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 인벤토리 가방 표시 -->
    <div class="mt-3 pt-2 border-t border-dashed border-slate-200 flex flex-wrap gap-2 items-center">
      <span class="text-xs font-bold text-slate-500 flex items-center gap-1">
        <i data-lucide="package" class="w-4 h-4"></i> 소지품:
      </span>
      <div id="inventory-list" class="flex flex-wrap gap-1">
        <span class="text-xs bg-slate-100 border border-slate-300 px-2 py-0.5 rounded font-medium text-slate-800">낡은 칼 한 자루</span>
      </div>
    </div>

    <!-- 동료 상태창 -->
    <div class="mt-2 pt-2 border-t border-dashed border-slate-200 flex items-center justify-between">
      <span class="text-xs font-bold text-slate-500 flex items-center gap-1">
        <i data-lucide="user" class="w-4 h-4"></i> 동행자:
      </span>
      <div id="companion-badge" class="flex items-center gap-1.5 bg-slate-100 border border-slate-300 px-3 py-1 rounded-lg text-xs font-medium text-slate-800">
        <span>쓸쓸한 발걸음 (없음)</span>
      </div>
    </div>
  </header>

  <!-- 메인 게임 보드 (스토리 출력 및 선택지) -->
  <main id="game-window" class="w-full max-w-2xl bg-white border-2 border-slate-900 rounded-3xl p-6 shadow-[8px_8px_0px_0px_rgba(15,23,42,1)] flex-grow flex flex-col justify-between gap-6 z-10 transition-all duration-300">
    <!-- 스토리 이미지 또는 분위기 연출용 일러스트 영역 -->
    <div id="story-visual" class="w-full h-40 bg-slate-100 border-2 border-slate-900 rounded-2xl flex flex-col items-center justify-center overflow-hidden relative transition-colors duration-1500">
      <div id="visual-emoji" class="text-6xl filter drop-shadow z-10 transition-all duration-1000">🏡</div>
      <!-- 어두운 오라 시각효과 -->
      <div id="darkness-overlay" class="absolute inset-0 bg-black/0 pointer-events-none transition-all duration-1500"></div>
      
      <!-- 실시간 전투 돌입 시 나타나는 적 HP바 UI -->
      <div id="enemy-health-panel" class="hidden absolute bottom-2 left-2 right-2 bg-slate-950/90 text-white p-2 rounded-xl border border-slate-800 flex flex-col gap-1 z-20">
        <div class="flex justify-between items-center text-xs font-bold px-1">
          <span id="enemy-name" class="text-slate-200">몬스터 이름</span>
          <span id="enemy-hp-text" class="text-slate-400">100/100</span>
        </div>
        <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden border border-slate-800">
          <div id="enemy-hp-bar" class="bg-rose-700 h-full transition-all duration-150" style="width: 100%"></div>
        </div>
      </div>
    </div>

    <!-- 텍스트 출력창 -->
    <div class="flex-grow flex flex-col justify-center min-h-[160px] relative px-2">
      <p id="story-text" class="text-base md:text-lg leading-relaxed text-slate-800 font-medium break-keep whitespace-pre-wrap">
        <!-- 스토리가 여기에 타이핑됩니다. -->
      </p>
    </div>

    <!-- 로그 알림창 (전투 연출 및 시스템 로그) -->
    <div id="battle-log" class="hidden bg-slate-950 border border-slate-800 text-slate-300 p-3 rounded-xl text-xs font-semibold tracking-wide">
      시스템 메시지가 기록됩니다.
    </div>

    <!-- [실시간 액션 전투 콘솔 패널] (전투 시 활성화됨) -->
    <div id="action-combat-panel" class="hidden flex-col gap-4 bg-slate-50 border-2 border-slate-900 p-4 rounded-2xl shadow-[4px_4px_0px_0px_rgba(15,23,42,1)]">
      <div class="text-center font-bold text-slate-800 text-xs tracking-widest uppercase mb-1 flex items-center justify-center gap-1">
        <i data-lucide="eye" class="w-4 h-4 text-rose-600"></i> 검격을 집중할 타이밍을 포착하십시오
      </div>
      
      <!-- QTE 타이밍 바 -->
      <div class="relative w-full h-6 bg-slate-200 rounded-full border border-slate-900 overflow-hidden">
        <!-- Perfect Zone -->
        <div class="absolute top-0 bottom-0 left-[44%] right-[44%] bg-slate-900 opacity-20 flex items-center justify-center"></div>
        <div class="absolute top-0 bottom-0 left-[46%] right-[46%] bg-rose-600 flex items-center justify-center text-[8px] font-black text-white">
          •
        </div>
        <!-- 움직이는 조준 핀 -->
        <div id="qte-pin" class="absolute top-0 bottom-0 w-2 bg-slate-950 h-full rounded-full" style="left: 0%;"></div>
      </div>

      <!-- 액션 실행 버튼 -->
      <div class="flex flex-col gap-2">
        <button id="qte-trigger-btn" onclick="executeAction()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-xl border border-slate-950 transition-all flex items-center justify-center gap-1 text-sm tracking-widest">
          <span>참 격 (斬 擊)</span>
        </button>

        <!-- 전투 하위 커맨드 그리드 -->
        <div class="grid grid-cols-3 gap-2">
          <button id="btn-combat-normal" onclick="switchCombatMode('normal')" class="bg-slate-900 text-white text-xs font-bold p-2.5 rounded-lg border border-slate-950">
            신중한 세전 (안정)
          </button>
          <button id="btn-combat-heavy" onclick="switchCombatMode('heavy')" class="bg-white border border-slate-300 text-slate-700 text-xs font-bold p-2.5 rounded-lg hover:bg-slate-100">
            강맹한 타격 (가속)
          </button>
          <button id="btn-combat-dodge" onclick="switchCombatMode('dodge')" class="bg-white border border-slate-300 text-slate-700 text-xs font-bold p-2.5 rounded-lg hover:bg-slate-100">
            흘려보내기 (경감)
          </button>
        </div>
      </div>
    </div>

    <!-- 4지선다 선택지 버튼 목록 (평상시 탐험용) -->
    <div class="grid grid-cols-1 gap-2.5" id="choice-container">
      <button onclick="makeChoice(0)" class="choice-btn group relative w-full text-left bg-white border border-slate-300 p-3.5 rounded-xl text-sm font-bold text-slate-800 hover:border-slate-900 hover:bg-slate-50 transition-all">
        <span id="choice-0">계획을 수립하는 중...</span>
      </button>
      <button onclick="makeChoice(1)" class="choice-btn group relative w-full text-left bg-white border border-slate-300 p-3.5 rounded-xl text-sm font-bold text-slate-800 hover:border-slate-900 hover:bg-slate-50 transition-all">
        <span id="choice-1">계획을 수립하는 중...</span>
      </button>
      <button onclick="makeChoice(2)" class="choice-btn group relative w-full text-left bg-white border border-slate-300 p-3.5 rounded-xl text-sm font-bold text-slate-800 hover:border-slate-900 hover:bg-slate-50 transition-all">
        <span id="choice-2">계획을 수립하는 중...</span>
      </button>
      <button onclick="makeChoice(3)" class="choice-btn group relative w-full text-left bg-white border border-slate-300 p-3.5 rounded-xl text-sm font-bold text-slate-800 hover:border-slate-900 hover:bg-slate-50 transition-all">
        <span id="choice-3">계획을 수립하는 중...</span>
      </button>
    </div>
  </main>

  <!-- 게임 오버 / 엔딩 오버레이 (숨겨짐) -->
  <div id="game-over-screen" class="hidden fixed inset-0 bg-slate-950/95 backdrop-blur-sm flex-col items-center justify-center p-6 z-50 text-white">
    <div class="max-w-md w-full text-center border border-slate-800 rounded-3xl p-8 bg-slate-900">
      <h2 class="text-2xl font-bold tracking-widest text-rose-500 mb-4" id="game-over-title">육신이 어둠에 파묻혔습니다</h2>
      <p class="text-sm mb-6 text-slate-400 font-light leading-relaxed" id="game-over-msg">심연의 무게를 견디지 못하고, 여정은 이곳에서 종막을 고합니다.</p>
      <button onclick="resetGame()" class="w-full bg-slate-100 text-slate-900 font-bold py-3.5 px-6 rounded-xl hover:bg-white transition-all text-sm tracking-widest">
        다시 운명의 선상으로
      </button>
    </div>
  </div>

  <!-- 푸터 및 고정 이동 버튼 -->
  <footer class="w-full max-w-2xl text-center text-[10px] tracking-widest text-slate-400 mt-4 mb-16 uppercase">
    <p>© 2026 THE ABYSS FOREST. ALL RIGHTS RESERVED.</p>
  </footer>

  <!-- 메인으로 돌아가기 버튼 (우측 하단 필수 요소) -->
  <a href="index.html" class="fixed bottom-4 right-4 bg-slate-900 text-white border border-slate-800 hover:bg-slate-800 font-bold text-xs px-4 py-2.5 rounded-full shadow-lg flex items-center gap-1.5 transition-all active:translate-y-0.5 z-40">
    <i data-lucide="home" class="w-4 h-4"></i>
    <span>메인으로 돌아가기</span>
  </a>

  <!-- 게임 자바스크립트 로직 -->
  <script>
    // 플레이어 기본 상태 객체
    let player = {
      level: 1,
      hp: 100,
      maxHp: 100,
      atk: 15,
      exp: 0,
      maxExp: 100,
      inventory: ["낡은 단검"],
      companion: null // 동료 시스템 객체: { name: "", type: "dog"|"slime"|"ghost"|"doll"|"crow", description: "" }
    };

    // 현재 게임이 어떤 테마 상태인지 추적
    let currentTheme = "theme-bright";

    // --- 액션 전투(QTE) 시스템 전용 변수 ---
    let isCombatActive = false;
    let combatState = {
      enemyName: "",
      enemyEmoji: "",
      enemyHp: 100,
      enemyMaxHp: 100,
      enemyAtk: 10,
      winNode: "start",
      currentMode: "normal" // normal, heavy, dodge
    };
    
    // QTE 움직임 제어용 변수
    let qtePosition = 0;
    let qteDirection = 1; // 1: 우측행, -1: 좌측행
    let qteSpeed = 1.8; 
    let qteIntervalId = null;

    // 텍스트 RPG 스토리 노드 데이터 (더 차분하고 긴 서사 중심)
    const storyData = {
      start: {
        title: "아르카디아의 침묵",
        theme: "theme-bright",
        icon: "trees",
        emoji: "🏡",

        choices: [
          { text: "부러진 나뭇가지들을 모아 횃불 대용으로 가방에 묶는다.", next: "forest_enter", effect: () => getWeapon("마른 나뭇가지 묶음") },
          { text: "사제에게 마지막 기도를 부탁하여 마음을 다잡는다.", next: "start_check", effect: () => getExperience(20) },
          { text: "마을 초입의 이끼 낀 샘터에서 맑은 차가운 물을 한 통 긷는다.", next: "town_inn", effect: () => healHp(25) },
          { text: "홀로 쓸쓸히 어둠이 내리기 시작하는 숲길을 바라본다.", next: "start_check", effect: () => {} }
        ]
      },
      start_check: {
        title: "차가운 강철과 낡은 지도",
        theme: "theme-bright",
        icon: "search",
        emoji: "🎒",
        text: "사제가 건넨 흐릿한 지도에는 숲의 중심부로 향하는 고대 순례길이 핏빛 잉크로 아주 옅게 칠해져 있었습니다. 당신의 허리춤에는 아버지가 남겨준 녹슬고 낡은 가죽집 단검 한 자루가 매달려 있습니다. 화려하지는 않지만 차가운 이 무기만이 이 적막한 여정에서 신뢰할 수 있는 유일한 동반자입니다.",
        choices: [
          { text: "사제에게 길을 헤치고 나아가겠노라 다짐하며 출발한다.", next: "forest_enter", effect: () => {} },
          { text: "지도의 하단에 작게 기록된 개울가 우회로를 밟는다.", next: "forest_river", effect: () => {} },
          { text: "사제의 손에 꼭 쥐어져 있던 교회의 성수를 조용히 건네받는다.", next: "elder_advice", effect: () => {} },
          { text: "길가에 떨어진 깨진 도자기 칼날 조각을 주머니에 넣는다.", next: "forest_enter", effect: () => getWeapon("예리한 세라믹 조각") }
        ]
      },
      town_inn: {

        icon: "cup-soda",
        emoji: "🍖",

    window.onload = function () {
      lucide.createIcons();
      updateGameNode("start");
      startQteLoop(); // QTE 게이지 핀 연산 시작
    };

    // --- 동료 교체 시스템 ---
    function setCompanion(name, type, description) {
      player.companion = { name, type, description };
      showLog(`🤝 새로운 동반자 [${name}]가 곁에 나란히 섭니다.`);
      updateUI();
    }

    // --- 실시간 QTE 루프 연산구현 ---
    function startQteLoop() {
      if (qteIntervalId) clearInterval(qteIntervalId);
      qteIntervalId = setInterval(() => {
        let currentSpeed = qteSpeed;
        if (combatState.currentMode === "heavy") {
          currentSpeed = qteSpeed * 1.8; 
        } else if (combatState.currentMode === "dodge") {
          currentSpeed = qteSpeed * 0.85; 
        }

        // 동료 보너스: 슬라임이 차가운 점액을 뱉어 집중을 도움
        if (player.companion && player.companion.type === "slime") {
          currentSpeed *= 0.82;
        }
        
        // 동료 보너스: 가위인형 레아가 정교한 바느질 실력으로 핀의 속도를 늦추어 집중도를 돕습니다.
        if (player.companion && player.companion.type === "doll") {
          currentSpeed *= 0.70;
        }

        qtePosition += currentSpeed * qteDirection;
        if (qtePosition >= 100) {
          qtePosition = 100;
          qteDirection = -1;
        } else if (qtePosition <= 0) {
          qtePosition = 0;
          qteDirection = 1;
        }
        
        const pin = document.getElementById("qte-pin");
        if (pin) pin.style.left = `${qtePosition}%`;
      }, 16);
    }

    // --- 실시간 액션 전투 돌입 함수 ---
    function triggerActiveCombat(enemyName, enemyEmoji, maxHp, attack, winNodeKey) {
      isCombatActive = true;
      combatState.enemyName = enemyName;
      combatState.enemyEmoji = enemyEmoji;
      combatState.enemyHp = maxHp;
      combatState.enemyMaxHp = maxHp;
      combatState.enemyAtk = attack;
      combatState.winNode = winNodeKey;
      combatState.currentMode = "normal";

      // QTE 난이도 세팅
      if (enemyName.includes("이스카리옷")) {
        qteSpeed = 3.4; // 이스카리옷 전투는 극도로 엄밀함
      } else {
        qteSpeed = 2.0;
      }

      // UI 요소 전환
      document.getElementById("choice-container").classList.add("hidden");
      document.getElementById("action-combat-panel").classList.remove("hidden");
      document.getElementById("action-combat-panel").classList.add("flex");
      
      const enemyPanel = document.getElementById("enemy-health-panel");
      enemyPanel.classList.remove("hidden");
      
      document.getElementById("visual-emoji").textContent = enemyEmoji;
      
      updateCombatUI();
      showLog(`⚔️ [교전 시작] ${enemyName}의 냉혹한 투기가 대기를 짓누릅니다.`);
    }

    // 전투 하위 커맨드 모드 체인지
    function switchCombatMode(mode) {
      combatState.currentMode = mode;
      
      const btnNormal = document.getElementById("btn-combat-normal");
      const btnHeavy = document.getElementById("btn-combat-heavy");
      const btnDodge = document.getElementById("btn-combat-dodge");

      btnNormal.className = "bg-white border border-slate-300 text-slate-700 text-xs font-bold p-2.5 rounded-lg hover:bg-slate-100";
      btnHeavy.className = "bg-white border border-slate-300 text-slate-700 text-xs font-bold p-2.5 rounded-lg hover:bg-slate-100";
      btnDodge.className = "bg-white border border-slate-300 text-slate-700 text-xs font-bold p-2.5 rounded-lg hover:bg-slate-100";

      if (mode === 'normal') {
        btnNormal.className = "bg-slate-900 text-white text-xs font-bold p-2.5 rounded-lg border border-slate-950";
      } else if (mode === 'heavy') {
        btnHeavy.className = "bg-rose-950 text-rose-100 text-xs font-bold p-2.5 rounded-lg border border-rose-800 animate-pulse";
      } else if (mode === 'dodge') {
        btnDodge.className = "bg-emerald-950 text-emerald-100 text-xs font-bold p-2.5 rounded-lg border border-emerald-800";
      }
    }

    // --- 타이밍 공격 버튼 누를 시 실행 연산 ---
    function executeAction() {
      if (!isCombatActive) return;

      let performance = "MISS";
      let multiplier = 0;

      // 정밀 핀 위치 판정 (44% ~ 56% 사이는 극도로 예리한 참격)
      if (qtePosition >= 44 && qtePosition <= 56) {
        performance = "CRITICAL";
        // 외눈 까마귀 크로우가 있을 시 크리티컬 승수를 2.5배로 크게 확장합니다.
        if (player.companion && player.companion.type === "crow") {
          multiplier = 2.5;
        } else {
          multiplier = 2.2;
        }
      } else if (qtePosition >= 26 && qtePosition <= 74) {
        performance = "HIT";
        multiplier = 1.0;
      } else {
        performance = "MISS";
        multiplier = 0.25; 
      }

      let damageDealt = Math.floor(player.atk * multiplier);
      let damageTaken = combatState.enemyAtk;

      // 무덤 대검 및 사냥도끼 보너스 연산
      if (player.inventory.includes("무덤 수호자의 대검") || player.inventory.includes("나무꾼의 거대 사냥도끼")) {
        damageDealt = Math.floor(damageDealt * 1.35);
      }
      if (player.inventory.includes("수면 밑의 서리검")) {
        damageDealt += 6;
      }

      // 모드별 가중치 연산
      if (combatState.currentMode === "heavy") {
        damageDealt = Math.floor(damageDealt * 1.7); 
        damageTaken = Math.floor(damageTaken * 1.3); 
      } else if (combatState.currentMode === "dodge") {
        damageDealt = Math.floor(damageDealt * 0.4); 
        if (performance === "CRITICAL") {
          damageTaken = 0;
          showLog(`🛡️ [피해 무화] 가해지는 서리 참격을 완전히 비껴내며 예리하게 반격했습니다!`);
          damageDealt += 12; 
        } else if (performance === "HIT") {
          damageTaken = Math.floor(damageTaken * 0.3); 
        }
      }

      // 가위인형 레아 보너스: 치명적인 적의 대미지를 25% 추가 경감하는 방어막 가위 장벽 작동
      if (player.companion && player.companion.type === "doll" && damageTaken > 0) {
        damageTaken = Math.floor(damageTaken * 0.75);
        showLog(`🧸 [인형의 가위 장벽] 레아가 가위 손을 엮어 적의 대미지를 흡수했습니다!`);
      }

      if (player.companion && player.companion.type === "ghost") {
        damageDealt += 10;
      }

      // 1. 적 체력 연산
      combatState.enemyHp -= damageDealt;
      if (combatState.enemyHp < 0) combatState.enemyHp = 0;
      
      spawnDamageText(damageDealt, true, performance);

      // 2. 적 사망 판단
      if (combatState.enemyHp <= 0) {
        endCombat(true);
        return;
      }

      // 3. 반격 대미지 적용
      if (damageTaken > 0) {
        takeDamage(damageTaken);
      }

      // 4. 플레이어 사망 판단
      if (player.hp <= 0) {
        showGameOver(true, `☠️ ${combatState.enemyName}의 매서운 냉철에 가슴이 얼어붙어 영면에 들었습니다.`);
        endCombat(false);
        return;
      }

      updateCombatUI();
      
      if (performance === "CRITICAL") {
        showLog(`🔥 [크리티컬 참격!] 가장 예리한 급소에 참격을 가해 ${damageDealt} 피해를 입혔습니다!`);
      } else if (performance === "HIT") {
        showLog(`⚔️ [검격 성공] 적의 가슴팍에 날이 닿아 ${damageDealt} 피해를 전했습니다.`);
      } else {
        showLog(`💨 [빗나감] 손끝이 한기에 떨려 어긋났습니다. (${damageDealt} 피해)`);
      }
    }

    // 대미지 수치 생성기
    function spawnDamageText(amount, isEnemy, performance) {
      const parent = document.getElementById("story-visual");
      const text = document.createElement("span");
      text.className = "damage-text";
      
      let color = "#ef4444"; 
      if (performance === "CRITICAL") {
        color = "#ffffff"; 
        text.style.fontSize = "2.6rem";
      } else if (performance === "MISS") {
        color = "#78716c"; 
      }
      
      text.style.color = color;
      text.textContent = amount;
      
      const leftRandom = 35 + Math.random() * 30;
      text.style.left = `${leftRandom}%`;
      text.style.top = `35%`;
      
      parent.appendChild(text);
      setTimeout(() => text.remove(), 1000);
    }

    function updateCombatUI() {
      document.getElementById("enemy-name").textContent = `${combatState.enemyEmoji} ${combatState.enemyName}`;
      document.getElementById("enemy-hp-text").textContent = `${combatState.enemyHp}/${combatState.enemyMaxHp}`;
      
      const hpPercentage = (combatState.enemyHp / combatState.enemyMaxHp) * 100;
      document.getElementById("enemy-hp-bar").style.width = `${hpPercentage}%`;
      
      updateUI();
    }

    function endCombat(isVictory) {
      isCombatActive = false;
      
      document.getElementById("action-combat-panel").classList.remove("flex");
      document.getElementById("action-combat-panel").classList.add("hidden");
      document.getElementById("choice-container").classList.remove("hidden");
      document.getElementById("enemy-health-panel").classList.add("hidden");

      if (isVictory) {
        let expReward = Math.floor(combatState.enemyMaxHp * 0.9);
        getExperience(expReward);
        
        showLog(`🎉 승전. ${combatState.enemyName}의 잔영을 조용하게 흐트러뜨려 안식시켰습니다. (+${expReward} EXP)`);
        updateGameNode(combatState.winNode);
      }
    }

    function updateGameNode(nodeKey) {
      currentNode = nodeKey;
      const node = storyData[nodeKey];
      if (!node) return;

      // 동료 매턴 발동 효과 (슬라임 힐)
      if (player.companion && player.companion.type === "slime") {
        if (player.hp < player.maxHp) {
          player.hp = Math.min(player.maxHp, player.hp + 8);
          showLog(`🟢 [슬라임 정화] 가슴 속 차가운 독기가 이슬에 닿아 조용히 사그라듭니다. (+8 HP)`);
        }
      }

      // 1. 테마/배경 분위기 변경
      const body = document.body;
      body.classList.remove("theme-bright", "theme-creepy", "theme-dark", "theme-abyss");
      body.classList.add(node.theme);
      currentTheme = node.theme;

      // 2. 비주얼 박스 연출 업데이트
      const visualBox = document.getElementById("story-visual");
      const emojiBox = document.getElementById("visual-emoji");
      const darkness = document.getElementById("darkness-overlay");
      
      emojiBox.textContent = node.emoji;

      if (node.theme === "theme-bright") {
        visualBox.className = "w-full h-40 bg-slate-50 border border-slate-900 rounded-2xl flex flex-col items-center justify-center overflow-hidden relative transition-all duration-1500";
        darkness.style.backgroundColor = "rgba(0,0,0,0)";
        document.getElementById("game-icon").className = "text-slate-800";
      } else if (node.theme === "theme-creepy") {
        visualBox.className = "w-full h-40 bg-slate-200 border border-slate-900 rounded-2xl flex flex-col items-center justify-center overflow-hidden relative transition-all duration-1500";
        darkness.style.backgroundColor = "rgba(148,163,184,0.15)";
        document.getElementById("game-icon").className = "text-slate-600 animate-pulse";
      } else if (node.theme === "theme-dark") {
        visualBox.className = "w-full h-40 bg-rose-950/20 border border-rose-900 rounded-2xl flex flex-col items-center justify-center overflow-hidden relative transition-all duration-1500";
        darkness.style.backgroundColor = "rgba(127,29,29,0.3)";
        document.getElementById("game-icon").className = "text-rose-700 animate-bounce";
      } else if (node.theme === "theme-abyss") {
        visualBox.className = "w-full h-40 bg-stone-950 border border-indigo-950 rounded-2xl flex flex-col items-center justify-center overflow-hidden relative transition-all duration-1500";
        darkness.style.backgroundColor = "rgba(15,23,42,0.6)";
        document.getElementById("game-icon").className = "text-indigo-900";
      }

      // 스테이지 배지 변경
      document.getElementById("stage-badge").textContent = node.title;

      // 3. 타이핑 효과로 스토리 텍스트 세팅
      const storyTextEl = document.getElementById("story-text");
      storyTextEl.innerHTML = "";
      let index = 0;
      
      toggleButtons(false);
      
      function typeCharacter() {
        if (index < node.text.length) {
          storyTextEl.innerHTML += node.text.charAt(index);
          index++;
          setTimeout(typeCharacter, 6);
        } else {
          toggleButtons(true);
        }
      }
      typeCharacter();

      // 4. 선택지 세팅
      for (let i = 0; i < 4; i++) {
        const choiceBtn = document.getElementById(`choice-${i}`);
        const parentBtn = choiceBtn.parentElement;
        
        if (node.choices && node.choices[i]) {
          const choice = node.choices[i];
          
          if (choice.reqComp) {
            if (player.companion && player.companion.type === choice.reqComp) {
              parentBtn.style.display = "block";
              parentBtn.style.opacity = "1";
              parentBtn.style.pointerEvents = "auto";
              choiceBtn.textContent = choice.text;
            } else {
              parentBtn.style.display = "none";
              parentBtn.style.pointerEvents = "none";
            }
          } else {
            parentBtn.style.display = "block";
            parentBtn.style.opacity = "1";
            parentBtn.style.pointerEvents = "auto";
            choiceBtn.textContent = choice.text;
          }
          
          // 공포 테마 스타일 변경
          if (node.theme === "theme-dark" || node.theme === "theme-abyss") {
            parentBtn.className = "choice-btn group relative w-full text-left bg-slate-900 border border-slate-800 p-3.5 rounded-xl text-xs font-semibold text-slate-300 hover:border-slate-500 hover:bg-slate-800 transition-all";
          } else {
            parentBtn.className = "choice-btn group relative w-full text-left bg-white border border-slate-300 p-3.5 rounded-xl text-xs font-semibold text-slate-700 hover:border-slate-900 hover:bg-slate-50 transition-all";
          }
        } else {
          parentBtn.style.opacity = "0.2";
          parentBtn.style.pointerEvents = "none";
          choiceBtn.textContent = "아직은 아무 소리도 들리지 않습니다.";
        }
      }

      updateUI();
    }

    function toggleButtons(enable) {
      const buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach(btn => {
        if (enable) {
          btn.removeAttribute('disabled');
        } else {
          btn.setAttribute('disabled', 'true');
        }
      });
    }

    function makeChoice(index) {
      const node = storyData[currentNode];
      if (!node || !node.choices[index]) return;

      const choice = node.choices[index];
      choice.effect();

      const gameWindow = document.getElementById("game-window");
      gameWindow.classList.add("shake-animation");
      setTimeout(() => {
        gameWindow.classList.remove("shake-animation");
      }, 400);

      if (player.hp <= 0 && !isCombatActive) {
        showGameOver(true, "💀 상처에 스며든 검은 기운을 다스리지 못하고, 차가운 흙 아래에서 영면에 듭니다.");
      } else if (!isCombatActive) {
        updateGameNode(choice.next);
      }
    }

    /* === 시스템 로직 함수들 === */

    function takeDamage(amount) {
      if (player.companion && player.companion.type === "dog") {
        const reducedAmount = Math.floor(amount * 0.75);
        const savedAmount = amount - reducedAmount;
        player.hp -= reducedAmount;
        showLog(`🐕 [사냥개의 등뼈] 늙은 사냥개가 가슴을 앞세워 한기를 나누어 가졌습니다. (-${reducedAmount} HP)`);
      } else {
        player.hp -= amount;
        showLog(`🩸 무거운 타격을 허용했습니다. (-${amount} HP)`);
      }

      if (player.hp < 0) player.hp = 0;
      triggerBloodSplatter();
      updateUI();
    }

    function healHp(amount) {
      player.hp += amount;
      if (player.hp > player.maxHp) player.hp = player.maxHp;
      showLog(`💚 메마른 목덜미 속으로 맑은 피가 다시 도는 것을 느낍니다. (+${amount} HP)`);
      updateUI();
    }

    function getExperience(amount) {
      player.exp += amount;
      showLog(`✨ 어둠 속에 발을 디디며 깊은 지혜와 조우합니다. (+${amount} EXP)`);
      
      if (player.exp >= player.maxExp) {
        player.level += 1;
        player.exp -= player.maxExp;
        player.maxExp = Math.floor(player.maxExp * 1.55);
        player.maxHp += 18;
        player.hp = player.maxHp;
        player.atk += 6;
        
        triggerLevelUpEffect();
      }
      updateUI();
    }

    function getWeapon(name) {
      if (!player.inventory.includes(name)) {
        player.inventory.push(name);
        showLog(`🎒 가방 구석에 쓸쓸한 전리품 [${name}]을(를) 거두었습니다.`);
        updateUI();
      }
    }

    function triggerBloodSplatter() {
      const container = document.getElementById("effect-container");
      const splat = document.createElement("div");
      splat.className = "blood-splatter";
      container.appendChild(splat);
      setTimeout(() => {
        splat.remove();
      }, 600);
    }

    function triggerLevelUpEffect() {
      showLog(`🎉 무딘 마음이 성찰을 입어 더욱 단단해집니다. (레벨 ${player.level} 도달)`);
      const gameWindow = document.getElementById("game-window");
      gameWindow.style.borderColor = "#94a3b8";
      setTimeout(() => {
        gameWindow.style.borderColor = "#0f172a";
      }, 1500);
    }

    function showLog(message) {
      const logEl = document.getElementById("battle-log");
      logEl.classList.remove("hidden");
      logEl.textContent = message;
      
      setTimeout(() => {
        logEl.classList.add("hidden");
      }, 5500);
    }

    function updateUI() {
      document.getElementById("status-level").textContent = `Lv. ${player.level}`;
      document.getElementById("status-atk").textContent = player.atk;
      
      document.getElementById("hp-text").textContent = `${player.hp}/${player.maxHp}`;
      const hpPercentage = (player.hp / player.maxHp) * 100;
      document.getElementById("hp-bar").style.width = `${hpPercentage}%`;

      document.getElementById("exp-text").textContent = `${player.exp}/${player.maxExp}`;
      const expPercentage = (player.exp / player.maxExp) * 100;
      document.getElementById("exp-bar").style.width = `${expPercentage}%`;

      const invListEl = document.getElementById("inventory-list");
      invListEl.innerHTML = "";
      
      player.inventory.forEach(item => {
        const span = document.createElement("span");
        if (currentTheme === "theme-dark" || currentTheme === "theme-abyss") {
          span.className = "text-[11px] bg-slate-950 text-slate-300 border border-slate-800 px-2.5 py-0.5 rounded font-medium flex items-center gap-0.5";
          span.innerHTML = `⚙️ ${item}`;
        } else {
          span.className = "text-[11px] bg-white border border-slate-300 px-2.5 py-0.5 rounded font-medium text-slate-800 flex items-center gap-0.5";
          span.innerHTML = `⚔️ ${item}`;
        }
        invListEl.appendChild(span);
      });

      const compBadge = document.getElementById("companion-badge");
      if (player.companion) {
        let compEmoji = "🤝";
        if (player.companion.type === "dog") compEmoji = "🐕";
        if (player.companion.type === "slime") compEmoji = "🟢";
        if (player.companion.type === "ghost") compEmoji = "👻";
        if (player.companion.type === "doll") compEmoji = "🧸";
        if (player.companion.type === "crow") compEmoji = "🐦";

        if (currentTheme === "theme-dark" || currentTheme === "theme-abyss") {
          compBadge.className = "flex items-center gap-1.5 bg-slate-950 border border-slate-800 px-3 py-1 rounded-lg text-xs font-semibold text-slate-300 animate-pulse";
          compBadge.innerHTML = `<span class="text-sm">${compEmoji}</span> <span>${player.companion.name} (${player.companion.description})</span>`;
        } else {
          compBadge.className = "flex items-center gap-1.5 bg-slate-50 border border-slate-300 px-3 py-1 rounded-lg text-xs font-semibold text-slate-700";
          compBadge.innerHTML = `<span class="text-sm">${compEmoji}</span> <span>${player.companion.name} (${player.companion.description})</span>`;
        }
      } else {
        compBadge.className = "flex items-center gap-1.5 bg-slate-100 border border-slate-300 px-3 py-1 rounded-lg text-xs text-slate-500";
        compBadge.innerHTML = `<span>쓸쓸한 발걸음 (없음)</span>`;
      }
      
      lucide.createIcons();
    }

    function showGameOver(show, message = "") {
      const screen = document.getElementById("game-over-screen");
      if (show) {
        document.getElementById("game-over-msg").textContent = message;
        screen.classList.remove("hidden");
        screen.classList.add("flex");
      } else {
        screen.classList.add("hidden");
        screen.classList.remove("flex");
      }
    }

    function resetPlayer() {
      player.level = 1;
      player.hp = 100;
      player.maxHp = 100;
      player.atk = 15;
      player.exp = 0;
      player.maxExp = 100;
      player.inventory = ["낡은 단검"];
      player.companion = null;
      isCombatActive = false;
      updateUI();
    }

    function resetGame() {
      resetPlayer();
      showGameOver(false);
      
      document.getElementById("action-combat-panel").classList.remove("flex");
      document.getElementById("action-combat-panel").classList.add("hidden");
      document.getElementById("choice-container").classList.remove("hidden");
      document.getElementById("enemy-health-panel").classList.add("hidden");

      updateGameNode("start");
    }
  </script>
</body>
</html>
